# dnscrypt-proxy configuration for DDS container

listen_addresses = ['127.0.0.1:5553', '[::1]:5553']
max_clients = 250
cache_size = 4096
cache_min_ttl = 600
cache_max_ttl = 86400
reject_ttl = 600

server_names = ['cloudflare', 'google', 'alidns-doh', 'dnspod-doh']
bootstrap_resolvers = ['9.9.9.9:53', '1.1.1.1:53']

cloaking_rules = '/config/dnscrypt-proxy/cloaking-rules.txt'
forwarding_rules = '/config/dnscrypt-proxy/forwarding-rules.txt'

ignore_system_dns = true
require_dnssec = false
require_nolog = true
require_nofilter = true
force_tcp = false

timeout = 2500
keepalive = 30
log_level = 2

dnscrypt_ephemeral_keys = true
tls_disable_session_tickets = false

[sources.'public-resolvers']
urls = [
  'https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v3/public-resolvers.md',
  'https://download.dnscrypt.info/resolvers-list/v3/public-resolvers.md',
  'https://cdn.jsdelivr.net/gh/DNSCrypt/dnscrypt-resolvers@master/v3/public-resolvers.md'
]
minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'
cache_file = 'public-resolvers.md'

[sources.'relays']
urls = [
  'https://raw.githubusercontent.com/DNSCrypt/dNScrypt-resolvers/master/v3/relays.md',
  'https://download.dnscrypt.info/resolvers-list/v3/relays.md'
]
minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'
cache_file = 'relays.md'
