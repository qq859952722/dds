# 文件保存目录（下载中）
dir=/download/inAdown
# 磁盘缓存
disk-cache=64M
# 文件预分配方式
file-allocation=falloc
# 断点续传
continue=true
# 最大同时下载任务数
max-concurrent-downloads=5
# 单服务器最大连接数
max-connection-per-server=16
# 最小分片大小
min-split-size=1M
# 分片数量
split=16
# 总最大下载速度（0为不限）
max-overall-download-limit=0
# 总最大上传速度（0为不限）
max-overall-upload-limit=0

# 启用RPC
enable-rpc=true
# RPC监听端口
rpc-listen-port=6800
# RPC密钥
rpc-secret=dds
# 允许所有来源
rpc-allow-origin-all=true
# 允许外部访问
rpc-listen-all=true

# BT监听端口
listen-port=6881-6999
# DHT监听端口
dht-listen-port=6881-6999
# 启用DHT
enable-dht=true
# 启用DHT6
enable-dht6=true
# BT tracker列表（由更新脚本自动填充）
bt-tracker=
# 启用本地节点发现
bt-enable-lpd=true
# 启用Peer Exchange
enable-peer-exchange=true
# BT做种时间（分钟）
seed-time=60
# 强制加密
bt-force-encryption=true
# 分离仅做种任务
bt-detach-seed-only=true

# 会话保存文件
input-file=/config/aria2/aria2.session
save-session=/config/aria2/aria2.session
save-session-interval=60
# 自动保存间隔
auto-save-interval=60
# 日志级别
log-level=warn
# 下载完成执行的脚本
on-download-complete=/bin/move_complete.sh
