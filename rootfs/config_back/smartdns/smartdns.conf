# 服务运行模式（主服务器）
server-mode=main
# 服务名称
server-name=smartdns
# DNS TCP监听地址
bind-tcp [::]:5353
# DNS UDP监听地址
bind [::]:5353
# 缓存大小
cache-size=4096
# 缓存持久化
cache-persist=yes
# 预取域名
prefetch-domain=yes
# 速度检查模式
speed-check-mode=tcp:80,tcp:443
# 域名去重
serve-expired=yes
serve-expired-ttl=86400
# 日志级别
log-level=info
# 日志输出到stdout
log-file=/dev/stdout
# 双栈IP优选
dualstack-ip-selection=yes
dualstack-ip-selection-threshold=15

# 国内DNS服务器
server https://dns.alidns.com/dns-query -group domestic -exclude-default-group
server https://doh.pub/dns-query -group domestic -exclude-default-group
server 223.5.5.5 -group domestic -exclude-default-group
server 119.29.29.29 -group domestic -exclude-default-group

# 国外DNS服务器
server https://dns.google/dns-query -group overseas -exclude-default-group
server https://cloudflare-dns.com/dns-query -group overseas -exclude-default-group
server 8.8.8.8 -group overseas -exclude-default-group
server 1.1.1.1 -group overseas -exclude-default-group

# 域名集合定义
domain-set -name direct -file /config/smartdns/list/direct-list.txt
domain-set -name proxy -file /config/smartdns/list/proxy-list.txt

# 直连域名使用国内DNS
domain-rules /domain-set:direct/ -nameserver domestic
# 代理域名使用国外DNS
domain-rules /domain-set:proxy/ -nameserver overseas
