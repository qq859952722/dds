name: 检查更新并发布Release

on:
  schedule:
    - cron: '0 2 * * *'  # 每天UTC 02:00执行（北京时间10:00）
  workflow_dispatch:
    inputs:
      force_release:
        description: '强制发布（即使没有版本更新）'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载最新版本记录
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: .
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置环境
        run: |
          echo "WORKSPACE=${GITHUB_WORKSPACE}" >> $GITHUB_ENV
          echo "RELEASE_DIR=${GITHUB_WORKSPACE}/release_assets" >> $GITHUB_ENV
          echo "CHANGELOG_FILE=${GITHUB_WORKSPACE}/changelog.md" >> $GITHUB_ENV
          mkdir -p "${GITHUB_WORKSPACE}/release_assets"

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq tar

      - name: 运行下载脚本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./download_binaries.sh
          ./download_binaries.sh

      - name: 检查版本变化
        id: version_check
        run: |
          VERSION_RECORD="${GITHUB_WORKSPACE}/downloads/version_record.txt"
          LAST_VERSION_RECORD="${GITHUB_WORKSPACE}/last_version_record.txt"
          CHANGELOG="${GITHUB_WORKSPACE}/changelog.md"
          DETAILED_CHANGELOG="${GITHUB_WORKSPACE}/detailed_changelog.md"
          HAS_UPDATE=false
          
          echo "# 二进制文件版本更新" > "${CHANGELOG}"
          echo "" >> "${CHANGELOG}"
          echo "更新时间: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> "${CHANGELOG}"
          echo "" >> "${CHANGELOG}"
          
          # 检查当前版本记录是否存在
          echo "检查当前版本记录文件..."
          if [ ! -f "${VERSION_RECORD}" ]; then
            echo "未找到版本记录文件: ${VERSION_RECORD}"
            ls -la "${GITHUB_WORKSPACE}/downloads/" 2>/dev/null || echo "downloads目录不存在"
            echo "has_update=false" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "当前版本记录文件存在，内容:"
            cat "${VERSION_RECORD}"
          fi
          
          # 下载上次release的version_record.txt
          echo "正在获取上次release的版本记录..."
          LAST_RELEASE_API="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest"
          echo "API URL: ${LAST_RELEASE_API}"
          
          # 获取最新release信息
          LAST_RELEASE_INFO=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "${LAST_RELEASE_API}")
          LAST_RELEASE_TAG=$(echo "${LAST_RELEASE_INFO}" | jq -r '.tag_name // "none"')
          echo "Latest Release Tag: ${LAST_RELEASE_TAG}"
          
          # 列出所有可用资产
          echo "Release Assets:"
          echo "${LAST_RELEASE_INFO}" | jq -r '.assets[]?.name // empty' 2>/dev/null | while read -r asset; do
            echo "  - ${asset}"
          done
          
          # 提取version_record.txt的下载URL
          LAST_VERSION_URL=$(echo "${LAST_RELEASE_INFO}" | jq -r '.assets[]? | select(.name == "version_record.txt") | .browser_download_url' 2>/dev/null | head -1)
          echo "Version Record URL: ${LAST_VERSION_URL:-'NOT FOUND'}"
          
          if [ -n "${LAST_VERSION_URL}" ] && [ "${LAST_VERSION_URL}" != "null" ]; then
            echo "下载上次release的版本记录..."
            # 对于公共仓库的browser_download_url，不需要Authorization头
            HTTP_CODE=$(curl -s -L -w "%{http_code}" -o "${LAST_VERSION_RECORD}" "${LAST_VERSION_URL}")
            echo "Download HTTP Code: ${HTTP_CODE}"
            
            if [ -f "${LAST_VERSION_RECORD}" ] && [ -s "${LAST_VERSION_RECORD}" ]; then
              echo "下载成功，文件内容:"
              cat "${LAST_VERSION_RECORD}"
            else
              echo "警告: version_record.txt 下载失败或文件为空"
              rm -f "${LAST_VERSION_RECORD}"
              
              # 尝试备用方法：使用API直接下载
              echo "尝试使用API备用方法下载..."
              RELEASE_ASSET_ID=$(echo "${LAST_RELEASE_INFO}" | jq -r '.assets[]? | select(.name == "version_record.txt") | .id' 2>/dev/null | head -1)
              if [ -n "${RELEASE_ASSET_ID}" ] && [ "${RELEASE_ASSET_ID}" != "null" ]; then
                ASSET_API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${RELEASE_ASSET_ID}"
                curl -s -L -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/octet-stream" -o "${LAST_VERSION_RECORD}" "${ASSET_API_URL}"
                
                if [ -f "${LAST_VERSION_RECORD}" ] && [ -s "${LAST_VERSION_RECORD}" ]; then
                  echo "备用方法下载成功，文件内容:"
                  cat "${LAST_VERSION_RECORD}"
                else
                  echo "备用方法也失败了"
                  rm -f "${LAST_VERSION_RECORD}"
                fi
              fi
            fi
          else
            echo "未找到上次release中的version_record.txt资产"
            echo "请检查GitHub Releases页面确认该文件是否存在"
          fi
          
          # 初始化详细变更日志
          echo "## 版本变更详情" > "${DETAILED_CHANGELOG}"
          echo "" >> "${DETAILED_CHANGELOG}"
          
          if [ -f "${LAST_VERSION_RECORD}" ]; then
            # 排序后比较版本记录，确保顺序不影响比较结果
            SORTED_CURRENT=$(sort "${VERSION_RECORD}")
            SORTED_LAST=$(sort "${LAST_VERSION_RECORD}")
            
            echo "=== 版本记录比较 ==="
            echo "当前版本记录:"
            echo "${SORTED_CURRENT}"
            echo "---"
            echo "上次版本记录:"
            echo "${SORTED_LAST}"
            echo "==================="
            
            if [ "${SORTED_CURRENT}" != "${SORTED_LAST}" ]; then
              echo "版本记录有变化，准备发布新release"
              HAS_UPDATE=true
              
              # 生成详细的变更日志
              echo "### 版本变更" >> "${DETAILED_CHANGELOG}"
              echo "" >> "${DETAILED_CHANGELOG}"
              
              # 比较具体变更的项目
              while IFS=: read -r project_name current_version; do
                last_version=$(grep "^${project_name}:" "${LAST_VERSION_RECORD}" | cut -d: -f2-)
                
                if [ "${current_version}" != "${last_version}" ]; then
                  if [ -z "${last_version}" ]; then
                    echo "- **${project_name}**: 新增项目，版本 ${current_version}" >> "${DETAILED_CHANGELOG}"
                  else
                    echo "- **${project_name}**: ${last_version} → ${current_version}" >> "${DETAILED_CHANGELOG}"
                  fi
                fi
              done < <(sort "${VERSION_RECORD}")
              
              echo "" >> "${DETAILED_CHANGELOG}"
            else
              echo "版本记录无变化，无需发布"
            fi
          else
            echo "首次发布或未找到上次版本记录"
            HAS_UPDATE=true
            
            echo "### 版本变更" >> "${DETAILED_CHANGELOG}"
            echo "" >> "${DETAILED_CHANGELOG}"
            echo "- **状态**: 首次发布" >> "${DETAILED_CHANGELOG}"
            echo "- **详情**: 初始版本发布" >> "${DETAILED_CHANGELOG}"
            echo "" >> "${DETAILED_CHANGELOG}"
          fi
          
          # 检查是否强制发布
          if [ "${{ github.event.inputs.force_release }}" == "true" ]; then
            echo "强制发布模式"
            HAS_UPDATE=true
          fi
          
          echo "has_update=${HAS_UPDATE}" >> $GITHUB_OUTPUT
          
          echo "=== 变更日志 ==="
          cat "${CHANGELOG}"
          cat "${DETAILED_CHANGELOG}"

      - name: 获取源项目Release信息
        if: steps.version_check.outputs.has_update == 'true'
        id: fetch_source_releases
        run: |
          VERSION_RECORD="${GITHUB_WORKSPACE}/downloads/version_record.txt"
          LAST_VERSION_RECORD="${GITHUB_WORKSPACE}/last_version_record.txt"
          DETAILED_CHANGELOG="${GITHUB_WORKSPACE}/detailed_changelog.md"
          
          echo "## 源项目Release信息" >> "${DETAILED_CHANGELOG}"
          echo "" >> "${DETAILED_CHANGELOG}"
          
          # 从download_binaries.sh中提取项目配置
          while IFS='|' read -r project_name owner repo asset_amd64 asset_arm64 binary_name; do
            # 跳过注释和空行
            [[ "${project_name}" =~ ^#.*$ ]] && continue
            [[ -z "${project_name}" ]] && continue
            
            # 获取当前版本
            current_version=$(grep "^${project_name}:" "${VERSION_RECORD}" 2>/dev/null | cut -d: -f2-)
            
            if [ -n "${current_version}" ]; then
              # 获取源项目的release body
              RELEASE_API="https://api.github.com/repos/${owner}/${repo}/releases/tags/${current_version}"
              RELEASE_BODY=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "${RELEASE_API}" | jq -r '.body // empty' 2>/dev/null || echo "")
              
              if [ -n "${RELEASE_BODY}" ]; then
                echo "### ${project_name}" >> "${DETAILED_CHANGELOG}"
                echo "- **仓库**: ${owner}/${repo}" >> "${DETAILED_CHANGELOG}"
                echo "- **版本**: ${current_version}" >> "${DETAILED_CHANGELOG}"
                echo "" >> "${DETAILED_CHANGELOG}"
                
                # 添加release body（截断到500字符以避免过长）
                TRUNCATED_BODY=$(echo "${RELEASE_BODY}" | head -c 500)
                if [ ${#RELEASE_BODY} -gt 500 ]; then
                  TRUNCATED_BODY="${TRUNCATED_BODY}..."
                fi
                
                echo "#### Release Notes" >> "${DETAILED_CHANGELOG}"
                echo "" >> "${DETAILED_CHANGELOG}"
                echo "${TRUNCATED_BODY}" >> "${DETAILED_CHANGELOG}"
                echo "" >> "${DETAILED_CHANGELOG}"
                echo "---" >> "${DETAILED_CHANGELOG}"
                echo "" >> "${DETAILED_CHANGELOG}"
              fi
            fi
          done < <(grep -v "^#" download_binaries.sh | grep -E "^[a-zA-Z]" | sed 's/^[[:space:]]*//' | sed 's/"$//')
          
          echo "=== 完整的Release描述 ==="
          cat "${DETAILED_CHANGELOG}"

      - name: 打包二进制文件
        if: steps.version_check.outputs.has_update == 'true'
        run: |
          DOWNLOAD_DIR="${GITHUB_WORKSPACE}/downloads"
          RELEASE_DIR="${GITHUB_WORKSPACE}/release_assets"
          
          # 打包amd64架构
          if [ -d "${DOWNLOAD_DIR}/amd64" ] && [ "$(ls -A ${DOWNLOAD_DIR}/amd64 2>/dev/null)" ]; then
            echo "打包amd64架构..."
            tar -czf "${RELEASE_DIR}/linux-binaries-x86_64.tar.gz" \
              -C "${DOWNLOAD_DIR}" amd64/
            echo "amd64打包完成: $(du -h ${RELEASE_DIR}/linux-binaries-x86_64.tar.gz | cut -f1)"
          fi
          
          # 打包arm64架构
          if [ -d "${DOWNLOAD_DIR}/arm64" ] && [ "$(ls -A ${DOWNLOAD_DIR}/arm64 2>/dev/null)" ]; then
            echo "打包arm64架构..."
            tar -czf "${RELEASE_DIR}/linux-binaries-arm64.tar.gz" \
              -C "${DOWNLOAD_DIR}" arm64/
            echo "arm64打包完成: $(du -h ${RELEASE_DIR}/linux-binaries-arm64.tar.gz | cut -f1)"
          fi
          
          # 复制版本记录
          if [ -f "${DOWNLOAD_DIR}/version_record.txt" ]; then
            cp "${DOWNLOAD_DIR}/version_record.txt" "${RELEASE_DIR}/version_record.txt"
            echo "已复制version_record.txt"
            cat "${RELEASE_DIR}/version_record.txt"
          else
            echo "警告: 未找到version_record.txt文件"
            # 创建版本记录文件
            ls -la "${DOWNLOAD_DIR}/"
          fi
          
          echo "=== 打包文件列表 ==="
          ls -lh "${RELEASE_DIR}/"

      - name: 生成Release标签名
        if: steps.version_check.outputs.has_update == 'true'
        id: tag_name
        run: |
          TAG_NAME="binaries-$(date '+%Y%m%d-%H%M%S')"
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "release_name=二进制文件集合 $(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 创建Release
        if: steps.version_check.outputs.has_update == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_name.outputs.tag_name }}
          name: ${{ steps.tag_name.outputs.release_name }}
          body_path: ${{ env.WORKSPACE }}/detailed_changelog.md
          files: |
            ${{ env.RELEASE_DIR }}/linux-binaries-x86_64.tar.gz
            ${{ env.RELEASE_DIR }}/linux-binaries-arm64.tar.gz
            ${{ env.RELEASE_DIR }}/version_record.txt
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 输出结果
        run: |
          if [ "${{ steps.version_check.outputs.has_update }}" == "true" ]; then
            echo "✅ 已创建新的Release"
            echo "标签: ${{ steps.tag_name.outputs.tag_name }}"
          else
            echo "ℹ️ 所有项目均为最新版本，无需发布"
          fi
