name: Check and Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq tar sed unzip

      - name: Get latest release and extract version record
        id: get-latest-release
        run: |
          mkdir -p downloads
          
          LATEST_RELEASE=$(curl -s -L "https://api.github.com/repos/${{ github.repository }}/releases/latest" || echo "")
          
          if [ -n "${LATEST_RELEASE}" ]; then
            TAG_NAME=$(echo "${LATEST_RELEASE}" | jq -r '.tag_name // empty')
            echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
            
            BODY=$(echo "${LATEST_RELEASE}" | jq -r '.body // empty')
            if [ -n "${BODY}" ]; then
              echo "Extracting version info from previous release body..."
              echo "${BODY}" | grep -E "^- \*\*.*\*\*: .*$" | sed -E 's/^- \*\*(.*)\*\*: (.*)$/\1:\2/' > downloads/version_record.txt
            fi
          fi

      - name: Run download_binaries.sh
        id: download-binaries
        run: |
          chmod +x download_binaries.sh
          ./download_binaries.sh

      - name: Generate complete new version record
        id: generate-version-record
        run: |
          cd downloads
          > version_record.new
          
          PROJECTS=(
            "transmission|qq859952722|transmission-builder"
            "qbittorrent|userdocs|qbittorrent-nox-static"
            "smartdns|pymumu|smartdns"
            "adguardhome|AdguardTeam|AdGuardHome"
            "dnscrypt-proxy|DNSCrypt|dnscrypt-proxy"
            "aria2|SuperNG6|Aria2-Pro-Core"
          )
          
          for project_config in "${PROJECTS[@]}"; do
            IFS='|' read -r project_name owner repo <<< "${project_config}"
            LATEST_VERSION=$(curl -s "https://api.github.com/repos/${owner}/${repo}/releases/latest" | jq -r '.tag_name // empty' || echo "")
            if [ -n "${LATEST_VERSION}" ]; then
              echo "${project_name}:${LATEST_VERSION}" >> version_record.new
            fi
          done
          
          echo "New version record:"
          cat version_record.new

      - name: Check if versions have changed
        id: check-update
        run: |
          cd downloads
          
          HAS_UPDATE=false
          
          if [ ! -f version_record.txt ]; then
            echo "No previous version record found - will create first release"
            HAS_UPDATE=true
          else
            echo "Previous version record:"
            cat version_record.txt
            echo ""
            echo "New version record:"
            cat version_record.new
            echo ""
            
            if ! diff -q <(sort version_record.txt) <(sort version_record.new) >/dev/null; then
              echo "Versions have changed!"
              HAS_UPDATE=true
            else
              echo "No version changes detected"
            fi
          fi
          
          echo "has_update=${HAS_UPDATE}" >> $GITHUB_OUTPUT

      - name: Prepare release notes
        if: steps.check-update.outputs.has_update == 'true'
        id: prepare-release-notes
        run: |
          cd downloads
          
          RELEASE_NOTES="# Software Versions\n\n"
          
          if [ -f version_record.new ]; then
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                PROJECT=$(echo "$line" | cut -d':' -f1)
                VERSION=$(echo "$line" | cut -d':' -f2-)
                RELEASE_NOTES+="- **${PROJECT}**: ${VERSION}\n"
              fi
            done < version_record.new
          fi
          
          echo -e "${RELEASE_NOTES}" > release_notes.txt
          echo -e "Release Notes:\n${RELEASE_NOTES}"

      - name: Create final version_record.txt
        if: steps.check-update.outputs.has_update == 'true'
        run: |
          cd downloads
          if [ -f version_record.new ]; then
            cp version_record.new version_record.txt
          fi

      - name: Package binaries
        if: steps.check-update.outputs.has_update == 'true'
        run: |
          DATE=$(date +%Y%m%d)
          ZIP_NAME="dds-${DATE}.zip"
          
          if [ -d downloads ]; then
            cd downloads
            zip -r "../${ZIP_NAME}" .
          fi

      - name: Get current date
        if: steps.check-update.outputs.has_update == 'true'
        id: get-date
        run: |
          DATE=$(date +%Y%m%d)
          echo "date=${DATE}" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check-update.outputs.has_update == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-date.outputs.date }}
          name: Release ${{ steps.get-date.outputs.date }}
          body_path: downloads/release_notes.txt
          files: dds-${{ steps.get-date.outputs.date }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
