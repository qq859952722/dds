name: Check and Release

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current versions from version_record.txt
        id: current_versions
        run: |
          if [ -f "downloads/version_record.txt" ]; then
            cat downloads/version_record.txt
            CURRENT_VERSIONS=$(cat downloads/version_record.txt)
          else
            echo "No version_record.txt found, will record first run versions"
            CURRENT_VERSIONS=""
          fi
          echo "current<<ENDOFVERSIONS" >> $GITHUB_OUTPUT
          echo "${CURRENT_VERSIONS}" >> $GITHUB_OUTPUT
          echo "ENDOFVERSIONS" >> $GITHUB_OUTPUT

      - name: Setup environment
        run: |
          chmod +x download_binaries.sh
          mkdir -p downloads

      - name: Download latest binaries
        run: |
          bash download_binaries.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compare versions
        id: compare
        run: |
          HAS_UPDATE=false
          UPDATE_NOTES=""
          
          if [ ! -f "downloads/version_record.txt" ]; then
            echo "::error::version_record.txt not created"
            exit 1
          fi
          
          OLD_VERSIONS="${{ steps.current_versions.outputs.current }}"
          
          while IFS=: read -r project new_version; do
            [ -z "${project}" ] && continue
            
            old_version=$(echo "${OLD_VERSIONS}" | grep "^${project}:" | cut -d: -f2- || echo "")
            
            if [ -z "${old_version}" ]; then
              UPDATE_NOTES+="- **${project}**: ${new_version} (首次发布)\n"
              HAS_UPDATE=true
            elif [ "${old_version}" != "${new_version}" ]; then
              UPDATE_NOTES+="- **${project}**: ${old_version} → ${new_version}\n"
              HAS_UPDATE=true
            fi
          done < downloads/version_record.txt
          
          echo "has_update=${HAS_UPDATE}" >> $GITHUB_OUTPUT
          echo "update_notes<<ENDOFNOTES" >> $GITHUB_OUTPUT
          echo -e "${UPDATE_NOTES}" >> $GITHUB_OUTPUT
          echo "ENDOFNOTES" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git

      - name: Commit version record
        if: steps.compare.outputs.has_update == 'true'
        run: |
          git add downloads/version_record.txt
          git diff --cached --quiet || git commit -m "chore: update version record [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate next tag
        if: steps.compare.outputs.has_update == 'true'
        id: tag
        run: |
          BASE_TAG="v$(date +%Y.%m.%d)"
          COUNTER=1
          NEW_TAG="${BASE_TAG}"
          
          while gh release view "${NEW_TAG}" &>/dev/null; do
            NEW_TAG="${BASE_TAG}.${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done
          
          echo "tag_name=${NEW_TAG}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: steps.compare.outputs.has_update == 'true'
        run: |
          FULL_NOTES="## Binary Updates\n\n${{ steps.compare.outputs.update_notes }}\n---\nGenerated: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          gh release create "${{ steps.tag.outputs.tag_name }}" \
            --title "Release ${{ steps.tag.outputs.tag_name }}" \
            --notes "${FULL_NOTES}" \
            downloads/amd64/* downloads/arm64/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No updates
        if: steps.compare.outputs.has_update != 'true'
        run: echo "All binaries are up to date"
