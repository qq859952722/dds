name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get DDS latest release version
        id: dds-version
        run: |
          VERSION=$(curl -fsSL "https://api.github.com/repos/qq859952722/dds/releases/latest" | jq -r '.tag_name')
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            VERSION="0.0.0"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "DDS version: ${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.dds-version.outputs.version }}

      - name: Build Docker image (amd64 only for test)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
          build-args: |
            DDS_VERSION=${{ steps.dds-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Docker image
        run: |
          echo "=== Image size check ==="
          docker images
          echo "=== Checking for non-root user ==="
          docker run --rm --entrypoint /bin/sh ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test -c 'id -u ddsuser'
          echo "=== Checking config_back ==="
          docker run --rm --entrypoint /bin/sh ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test -c 'ls -la /config_back'
          echo "=== Checking version file ==="
          docker run --rm --entrypoint /bin/sh ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test -c 'cat /dds-version'
          echo "=== Checking s6-overlay log service directories ==="
          docker run --rm --entrypoint /bin/sh ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test -c 'ls /etc/s6-overlay/s6-rc.d/ | grep -e "-log$"'

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DDS_VERSION=${{ steps.dds-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
